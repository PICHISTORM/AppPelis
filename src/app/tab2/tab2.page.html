<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Buscar Pelicula
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-toolbar>
  <ion-searchbar placeholder="Buscar pelicula"
                 animated
                 debounce="700"
                 [value]="textBuscar"
                 (ionChange)="buscar($event)"></ion-searchbar>
</ion-toolbar>


<ion-content>


  @if(buscando){
  <ion-grid>
    <ion-row>
      <ion-col text="center">
        <ion-spinner>
          name="crescent"
        </ion-spinner>
      </ion-col>

    </ion-row>
  </ion-grid>
  }




  <ion-list-header>
    <ion-label>Ideas</ion-label>
  </ion-list-header>


  @if(peliculas.length===0){


  <ion-list>



      @for(idea of ideas;track idea){
        <ion-item button (click)="textBuscar = idea; buscar({ detail: { value: idea } })">
        <ion-label color="primary">{{idea}}</ion-label>
        </ion-item>
      }




  </ion-list>
  }

  <ion-grid fixed>
    <ion-row>
      @for(pelicula of peliculas;track pelicula){
      <ion-col size="6">
        <ion-card (click)="detalle(pelicula.id)">
          <img [src]="pelicula.poster_path | imagen">

          <ion-card-header>
            <ion-card-subtitle>
              {{pelicula.release_date}} </ion-card-subtitle>
          </ion-card-header>

          <ion-card-content>
            <h2>{{pelicula.title}}</h2>
          </ion-card-content>

        </ion-card>
      </ion-col>
      }
    </ion-row>
  </ion-grid>

</ion-content>
