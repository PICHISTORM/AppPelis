<!-- Configuramos el contenedor con las opciones del slider -->
<swiper-container slides-per-view="3.3" space-between="10" free-mode="true">

  <!-- 1 -->
  @for (par of peliculas | pares; track $index) {
    <swiper-slide>
      <ion-row>

        <!-- 2 -->
        @for (pelicula of par; track pelicula.id) {
          <ion-col size="12">
            <ion-card class="poster-card">
              <img class="poster" [src]="pelicula.poster_path | imagen">
            </ion-card>
          </ion-col>
        }

      </ion-row>
    </swiper-slide>
  }

<swiper-slide class="slide-mas">
  <ion-row>
    <ion-col size="12" class="col-mas">
      <ion-button
                  class="btn-mas"
                  size="large"
                  (click)="onClick()">
        <ion-icon name="add" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-col>
  </ion-row>
</swiper-slide>

</swiper-container>
