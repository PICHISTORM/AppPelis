<swiper-container slides-per-view="1.1" space-between="10" free-mode="true">
  @for (pelicula of peliculas; track pelicula.id) {
    <swiper-slide>
      <ion-card class="backdrop-card" (click)="verDetalle(pelicula.id)">
        <img class="img-backdrop" [src]="pelicula.backdrop_path | imagen" />
      </ion-card>
    </swiper-slide>
  }
</swiper-container>
