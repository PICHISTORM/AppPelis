<ion-content>
  <swiper-container>
   @for (pelicula of peliculasReciente; track pelicula.id){
    <swiper-slide [slidesPerView]="1.1"  [spaceBetween]="10" [freeMode]="true">
      <ion-card>
        <img [src]="pelicula.backdrop_path | imagen">
      </ion-card>
    </swiper-slide>
   }
  </swiper-container>
</ion-content>
