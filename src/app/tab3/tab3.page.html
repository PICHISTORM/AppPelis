<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Favoritos
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Favoritos</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="ion-padding">
    @if (peliculasFavoritas.length === 0) {
      <ion-label color="medium">No tienes películas favoritas guardadas.</ion-label>
    } @else {
      <ion-grid>
        <ion-row>
          @for (pelicula of peliculasFavoritas; track pelicula.id) {
            <ion-col size="6" size-md="4">
              <ion-card>
                @if (pelicula.poster_path) {
                  <img [src]="pelicula.poster_path | imagen" />
                } @else {
                  <img src="assets/no-image-banner.png" />
                }

                <ion-card-content>
                  <ion-label class="ion-text-wrap">
                    <h3>{{ pelicula.title }}</h3>
                    <p>{{ obtenerGeneros(pelicula) }}</p>
                  </ion-label>
                </ion-card-content>
              </ion-card>
            </ion-col>
          }
        </ion-row>
      </ion-grid>
    }
  </div>
</ion-content>
